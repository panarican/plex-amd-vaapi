name: build-and-push

# Rebuilds the image on top of the LATEST linuxserver/plex daily, so the published
# image tracks new Plex releases automatically (the AMD driver layers are re-applied
# on each build). Also builds on push to master and on manual dispatch.
on:
  schedule:
    - cron: '17 6 * * *'        # daily ~06:17 UTC
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-and-push
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false            # a missing/expired PLEX_TOKEN shouldn't sink the public build
      matrix:
        include:
          - channel: public
            tag: latest
          - channel: plexpass
            tag: plexpass
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.channel }} channel, latest Plex + AMD VAAPI driver)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: true
          pull: true               # always pull the freshest linuxserver/plex base
          provenance: false
          build-args: |
            PLEX_CHANNEL=${{ matrix.channel }}
          secrets: |
            plex_token=${{ secrets.PLEX_TOKEN }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/plex-amd-vaapi:${{ matrix.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Plex + AMD VAAPI driver for gfx1150/gfx1151 (H.264 HW transcode) [${{ matrix.channel }} channel]
